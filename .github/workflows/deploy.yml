name: Deploy Nanoneuron CRM

on:
  push:
    branches: [main]

jobs:
  # ─── Backend: Railway deploys automatically on push to main ───
  # Railway is connected directly to GitHub — no extra steps needed.
  # Just push to main and Railway will detect changes and redeploy.

  # ─── Frontend: Build check (Cloudflare Pages auto-deploys from GitHub) ───
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1
